<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Achados e Perdidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <header class="fixed-top">
        <nav class="navbar navbar-expand-lg bg-white shadow-sm">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    <img src="assets/images/iconLogo.png" alt="Logo" width="100">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="lista-itens.html">Itens Cadastrados</a></li>
                    </ul>
                    <div class="dropdown">
                        <a href="#" class="d-block link-dark text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                            <img src="assets/images/avatarPadrão.png" alt="Conta" width="40" class="rounded-circle" id="avatarUsuario">
                            <span id="notificacaoPerfil" class="notification-badge"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end text-small">
                            <li><a class="dropdown-item" href="perfil.html">Meu Perfil</a></li>
                            <li><a class="dropdown-item" href="#" id="configuracoesLink">Configurações</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="logoutButton">Sair</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- Conteúdo Perfil -->
    <main class="container mt-5 mb-5 pt-5">
        <section class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header">
                        <h2 class="mb-0">Meu Perfil</h2>
                    </div>
                    <div class="card-body p-4" id="conteudoPerfil">
                        <!-- Informações do usuário serão carregadas aqui -->
                        <div class="text-center" id="loadingPerfil">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Carregando...</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Seção de Ações do Usuário/Ponto de Coleta -->
                <div class="card shadow-sm mt-4">
                    <div class="card-header">
                        <h3 class="mb-0">Minhas Ações</h3>
                    </div>
                    <div class="card-body p-4" id="acoesUsuario">
                        <!-- Ações específicas serão carregadas aqui -->
                    </div>
                </div>

                <!-- Seção de Itens do Usuário/Ponto de Coleta -->
                <div class="card shadow-sm mt-4">
                    <div class="card-header">
                        <h3 class="mb-0" id="tituloMeusItens">Meus Itens</h3>
                    </div>
                    <div class="card-body p-4" id="meusItens">
                        <!-- Lista de itens será carregada aqui -->
                    </div>
                </div>

            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-3 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2025 Achados e Perdidos - Todos os direitos reservados</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/perfil.js"></script> <!-- Script específico para o perfil -->
</body>
</html>
