<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itens Cadastrados - Achados e Perdidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <header class="fixed-top">
        <nav class="navbar navbar-expand-lg bg-white shadow-sm">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    <img src="assets/images/iconLogo.png" alt="Logo" width="100">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link active" aria-current="page" href="lista-itens.html">Itens Cadastrados</a></li>
                    </ul>
                    <div class="dropdown">
                        <a href="#" class="d-block link-dark text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                            <img src="assets/images/avatarPadrão.png" alt="Conta" width="40" class="rounded-circle" id="avatarUsuario">
                            <span id="notificacaoPerfil" class="notification-badge"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end text-small">
                            <li><a class="dropdown-item" href="perfil.html">Meu Perfil</a></li>
                            <li><a class="dropdown-item" href="#" id="configuracoesLink">Configurações</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="logoutButton">Sair</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- Conteúdo Lista de Itens -->
    <main class="container mt-5 mb-5 pt-5">
        <section class="py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">Itens Cadastrados na Plataforma</h2>
                <div>
                    <a href="item.html?action=achado" class="btn btn-success me-2">Achei um Item</a>
                    <a href="item.html?action=perdido" class="btn btn-danger">Perdi um Item</a>
                </div>
            </div>

            <!-- Filtros -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title">Filtrar Itens</h5>
                    <form class="row g-3" id="filtroItensForm">
                        <div class="col-md-4">
                            <label for="filtroTipo" class="form-label">Tipo (Achado/Perdido)</label>
                            <select id="filtroTipo" class="form-select">
                                <option value="">Todos</option>
                                <option value="achado">Achados</option>
                                <option value="perdido">Perdidos</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="filtroStatus" class="form-label">Status</label>
                            <select id="filtroStatus" class="form-select">
                                <option value="">Todos</option>
                                <option value="Achado">Achado (Disponível)</option>
                                <option value="Perdido">Perdido (Procurando)</option>
                                <option value="Coletado">Coletado (Em Ponto de Coleta)</option>
                                <option value="Em análise">Em Análise</option>
                                <!-- Adicionar mais status conforme necessário -->
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="filtroLocal" class="form-label">Local (palavra-chave)</label>
                            <input type="text" id="filtroLocal" class="form-control" placeholder="Ex: Shopping, Praça">
                        </div>
                        <div class="col-12 text-end">
                            <button type="submit" class="btn btn-primary">Aplicar Filtros</button>
                            <button type="reset" class="btn btn-secondary" id="limparFiltros">Limpar Filtros</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Lista de Itens -->
            <div id="listaDeItens" class="row g-4">
                <!-- Itens serão carregados aqui via JavaScript -->
                <div class="col-12 text-center" id="loadingItens">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Carregando itens...</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-3 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2025 Achados e Perdidos - Todos os direitos reservados</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/lista-itens.js"></script> <!-- Script específico para a lista de itens -->
</body>
</html>
